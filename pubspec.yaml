name: premium_quran
description: A premium Quran audio player.
publish_to: 'none'

version: 1.0.0+1

# THIS IS WHAT WAS MISSING:
environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  
  # Audio Engine
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.12
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0 
  audio_service: ^0.18.12
  
  # Fonts & UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  # Tell Flutter to load our audio and data folders
  assets:
    - assets/audio/
    - assets/data/
    - assets/images/ 

# CONFIGURATION FOR THE APP ICON
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png" # We will create this image next!
  min_sdk_android: 21

# CONFIGURATION FOR THE SPLASH SCREEN
flutter_native_splash:
  color: "#0A0D14" # Matches our AppColors.background exactly!
  image: "assets/images/splash_logo.png"   # We will create this image next!
  android: true
  ios: true
  android_12:
    color: "#0A0D14"
    image: "assets/images/splash_logo.png"